{% extends "base.html" %}

{% block title %}Portfolios{% endblock %}

{% block sidebar %}
{% include "partials/sidebar.html" %}
{% endblock %}

{% block content %}

<div class="container-fluid">

  <div id="alertContainer"></div>

  <div class="d-flex justify-content-between align-items-center mb-4">

    <div>
      <h2 class="mb-0">Portfolios</h2>
      <small class="text-muted">
        Organize your investments
      </small>
    </div>

    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#portfolioModal">

      New Portfolio

    </button>

  </div>

  <div id="portfolioContainer" class="row g-4">

  </div>

</div>


<!-- Create / Edit Modal -->

<div class="modal fade" id="portfolioModal" tabindex="-1">

  <div class="modal-dialog">

    <div class="modal-content">

      <div class="modal-header">

        <h5 id="portfolioFormTitle" class="modal-title">

          Create Portfolio

        </h5>

        <button class="btn-close" data-bs-dismiss="modal">
        </button>

      </div>

      <div class="modal-body">

        <form id="portfolioForm">

          <div class="mb-3">

            <label class="form-label">

              Portfolio Name

            </label>

            <input id="portfolioName" class="form-control" required>

          </div>

          <div class="mb-4">

            <label class="form-label">

              Description

            </label>

            <textarea id="portfolioDescription" rows="4" class="form-control">

</textarea>

          </div>

          <button id="savePortfolioButton" class="btn btn-success w-100">

            Save Portfolio

          </button>

        </form>

      </div>

    </div>

  </div>

</div>

<script src="/static/js/portfolios.js"></script>

{% endblock %}
