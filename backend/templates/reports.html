{% extends "base.html" %}

{% block title %}Reports{% endblock %}

{% block sidebar %}
{% include "partials/sidebar.html" %}
{% endblock %}

{% block content %}

<div class="container-fluid">

  <h2 class="mb-4">
    Portfolio Reports
  </h2>

  <div class="row g-4">

    <div class="col-lg-3">

      <div class="card shadow-sm">

        <div class="card-body">

          <small class="text-muted">
            Total Invested
          </small>

          <h3 id="reportInvested">
            $0.00
          </h3>

        </div>

      </div>

    </div>

    <div class="col-lg-3">

      <div class="card shadow-sm">

        <div class="card-body">

          <small class="text-muted">
            Current Value
          </small>

          <h3 id="reportValue">
            $0.00
          </h3>

        </div>

      </div>

    </div>

    <div class="col-lg-3">

      <div class="card shadow-sm">

        <div class="card-body">

          <small class="text-muted">
            Gain / Loss
          </small>

          <h3 id="reportGain">
            $0.00
          </h3>

        </div>

      </div>

    </div>

    <div class="col-lg-3">

      <div class="card shadow-sm">

        <div class="card-body">

          <small class="text-muted">
            Return
          </small>

          <h3 id="reportReturn">
            0%

          </h3>

        </div>

      </div>

    </div>

  </div>

  <div class="card shadow-sm mt-4">

    <div class="card-header">

      Portfolio Performance

    </div>

    <div class="card-body">

      <canvas id="reportChart"></canvas>

    </div>

  </div>

</div>

<script src="/static/js/chart.min.js"></script>
<script src="/static/js/reports.js"></script>
{% endblock %}
