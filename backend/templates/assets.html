{% extends "base.html" %}

{% block title %}
Assets
{% endblock %}

{% block sidebar %}
{% include "partials/sidebar.html" %}
{% endblock %}

{% block content %}

<div class="container-fluid">

  <div id="alertContainer"></div>

  <div class="d-flex justify-content-between align-items-center mb-4">

    <div>

      <h2 class="mb-0">Assets</h2>
      <small class="text-muted">
        Manage investment assets
      </small>

    </div>

    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#assetModal">

      New Asset

    </button>

  </div>

  <div class="card shadow-sm">

    <div class="card-body">

      <div class="row mb-3">

        <div class="col-md-4">

          <input id="assetSearch" class="form-control" placeholder="Search assets...">

        </div>

      </div>

      <div class="table-responsive">

        <table class="table table-hover align-middle">

          <thead>

            <tr>

              <th>Symbol</th>
              <th>Name</th>
              <th>Type</th>
              <th>Exchange</th>
              <th>Currency</th>
              <th>Price</th>
              <th>Status</th>
              <th width="150">Actions</th>

            </tr>

          </thead>

          <tbody id="assetsTableBody">

          </tbody>

        </table>

      </div>

    </div>

  </div>

</div>

<!-- Modal -->

<div class="modal fade" id="assetModal" tabindex="-1">

  <div class="modal-dialog">

    <div class="modal-content">

      <div class="modal-header">

        <h5 id="assetFormTitle" class="modal-title">

          Create Asset

        </h5>

        <button class="btn-close" data-bs-dismiss="modal">
        </button>

      </div>

      <div class="modal-body">

        <form id="assetForm">

          <div class="mb-3">

            <label class="form-label">

              Symbol

            </label>

            <input id="symbol" class="form-control" required>

          </div>

          <div class="mb-3">

            <label class="form-label">

              Name

            </label>

            <input id="name" class="form-control" required>

          </div>

          <div class="mb-3">

            <label class="form-label">

              Asset Type

            </label>

            <select id="assetType" class="form-select">

              <option>Stock</option>
              <option>ETF</option>
              <option>Mutual Fund</option>
              <option>Bond</option>
              <option>Crypto</option>
              <option>Commodity</option>
              <option>Forex</option>

            </select>

          </div>

          <div class="mb-3">

            <label class="form-label">

              Exchange

            </label>

            <input id="exchange" class="form-control">

          </div>

          <div class="mb-3">

            <label class="form-label">

              Currency

            </label>

            <input id="currency" value="USD" class="form-control">

          </div>

          <div class="mb-4">

            <label class="form-label">

              Current Price

            </label>

            <input id="currentPrice" type="number" step="0.01" class="form-control">

          </div>

          <button id="saveAssetButton" class="btn btn-success w-100">

            Save Asset

          </button>

        </form>

      </div>

    </div>

  </div>

</div>

<script src="/static/js/assets.js"></script>

{% endblock %}
